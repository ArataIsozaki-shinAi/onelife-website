<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 株式会社One Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+JP:wght@100;300;400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="https://res.cloudinary.com/duismpfyp/image/upload/v1774767021/OneLife_pcms1d.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/subpage.css">
</head>
<body>
  <header id="header" class="header is-scrolled">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="https://res.cloudinary.com/duismpfyp/image/upload/v1774767021/OneLife_pcms1d.png" alt="One Life inc." class="logo-img">
      </a>
      <nav class="nav-primary">
        <ul class="nav-list">
          <li><a href="index.html#introduction">GROUP INTRODUCTION</a></li>
          <li><a href="index.html#business">BUSINESS</a></li>
          <li><a href="index.html#message">PHILOSOPHY</a></li>
          <li><a href="index.html#company">ABOUT COMPANY</a></li>
          <li><a href="contact.html">CONTACT</a></li>
        </ul>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="mobile-nav" id="mobileNav">
    <nav>
      <ul>
        <li><a href="index.html#introduction">GROUP INTRODUCTION</a></li>
        <li><a href="index.html#business">BUSINESS</a></li>
        <li><a href="index.html#message">PHILOSOPHY</a></li>
        <li><a href="index.html#company">ABOUT COMPANY</a></li>
        <li><a href="contact.html">CONTACT</a></li>
      </ul>
    </nav>
  </div>

  <div class="page-header">
    <div class="page-header-inner">
      <span class="section-label">CONTACT</span>
      <h1 class="section-title">お問い合わせ</h1>
    </div>
  </div>

  <div class="subpage-content">
    <div class="subpage-inner">
      <p class="contact-page-lead">お問い合わせは、下記フォームよりお気軽にご連絡ください。<br>内容を確認の上、担当者よりご連絡いたします。</p>

      <form class="contact-form" action="#" method="post">
        <div class="form-group">
          <label class="form-label" for="name">お名前 <span class="form-required">必須</span></label>
          <input type="text" id="name" name="name" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="company">会社名</label>
          <input type="text" id="company" name="company" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">メールアドレス <span class="form-required">必須</span></label>
          <input type="email" id="email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">電話番号</label>
          <input type="tel" id="phone" name="phone" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label" for="message">お問い合わせ内容 <span class="form-required">必須</span></label>
          <textarea id="message" name="message" class="form-textarea" rows="8" required></textarea>
        </div>

        <div class="form-submit">
          <button type="submit" class="form-submit-btn">送信する</button>
        </div>
      </form>

      <a href="index.html" class="back-link"><span class="back-arrow"></span> BACK</a>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="https://res.cloudinary.com/duismpfyp/image/upload/v1774767021/OneLife_pcms1d.png" alt="One Life inc." class="footer-logo-img">
      </div>
      <p class="footer-copyright">&copy; 2024 One Life inc. All Rights Reserved.</p>
    </div>
  </footer>
  <script src="js/main.js"></script>
</body>
</html>
